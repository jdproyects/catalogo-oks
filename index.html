<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo Distribuidora OKS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="catalogo" class="contenedor-catalogo">
        </div>

    <script>
        const contenedor = document.getElementById('catalogo');

        fetch('datos.json')
            .then(response => response.json())
            .then(datos => {
                // Obtenemos el número de la página más alta en el JSON
                const maxPaginas = Math.max(...datos.map(d => d.pagina));
                
                for (let i = 1; i <= maxPaginas; i++) {
                    const divPagina = document.createElement('div');
                    divPagina.className = 'page';
                    
                    const img = document.createElement('img');
                    img.src = `paginas/pagina_${i}.jpg`; 
                    divPagina.appendChild(img);

                    // Filtrar precios de esta página
                    const preciosPagina = datos.filter(d => d.pagina === i);
                    
                    preciosPagina.forEach(item => {
                        const etiqueta = document.createElement('div');
                        etiqueta.className = 'etiqueta-precio';
                        etiqueta.style.left = item.x + '%';
                        etiqueta.style.top = item.y + '%';

                        let contenido = '';
                        if (item.precio_promo) {
                            contenido = `
                                <span class="precio-normal tachado">$ ${item.precio_normal}</span>
                                <span class="precio-promo">$ ${item.precio_promo}</span>
                            `;
                        } else {
                            contenido = `<span class="precio-normal">$ ${item.precio_normal}</span>`;
                        }
                        
                        etiqueta.innerHTML = contenido;
                        divPagina.appendChild(etiqueta);
                    });

                    contenedor.appendChild(divPagina);
                }
            });
    </script>
</body>
</html>
